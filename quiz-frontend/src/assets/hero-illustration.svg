<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" fill="none">
  <rect x="40" y="40" width="1120" height="680" rx="28" fill="#FFFFFF" stroke="#E6EEF9" />
  <!-- Left sidebar -->
  <rect x="72" y="80" width="160" height="560" rx="18" fill="#F5F9FF" />
  <!-- top stats -->
  <g transform="translate(260,90)">
    <rect x="0" y="0" width="160" height="84" rx="12" fill="#FBFBFF" stroke="#E9F2FF" />
    <rect x="188" y="0" width="160" height="84" rx="12" fill="#FBFBFF" stroke="#E9F2FF" />
    <rect x="376" y="0" width="160" height="84" rx="12" fill="#FBFBFF" stroke="#E9F2FF" />
    <rect x="564" y="0" width="160" height="84" rx="12" fill="#FBFBFF" stroke="#E9F2FF" />
  </g>
  <!-- chart area -->
  <g transform="translate(260,200)">
    <rect x="0" y="0" width="540" height="280" rx="12" fill="#FBFBFF" stroke="#E9F2FF" />
    <!-- small bars -->
    <rect x="28" y="60" width="26" height="120" rx="6" fill="#CCE5FF" />
    <rect x="68" y="40" width="26" height="140" rx="6" fill="#98D8FF" />
    <rect x="108" y="80" width="26" height="100" rx="6" fill="#7AD1FF" />
    <rect x="148" y="30" width="26" height="150" rx="6" fill="#2563EB" />
  </g>
  <!-- floating cards -->
  <rect x="840" y="120" width="150" height="150" rx="14" fill="#fff" stroke="#E9F2FF" />
  <rect x="740" y="380" width="220" height="120" rx="14" fill="#fff" stroke="#E9F2FF" />
  <rect x="320" y="420" width="140" height="84" rx="12" fill="#fff" stroke="#E9F2FF" />
  <!-- accent orbs -->
  <circle cx="360" cy="180" r="120" fill="#EEF6FF" />
</svg>